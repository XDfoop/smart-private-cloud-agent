kind = "web"
previewPath = "/"
title = "Smart Private Cloud Storage Agent"
version = "1.0.0"
id = "artifacts/smart-cloud"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24787

[services.development]
run = "pnpm --filter @workspace/smart-cloud run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-cloud", "run", "build" ]
publicDir = "artifacts/smart-cloud/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24787"
BASE_PATH = "/"
